<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - Jogador vs Robô</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
            flex-direction: column;
        }
        
        h1 {
            margin-bottom: 20px;
            font-size: 2em;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        #gameContainer {
            position: relative;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        canvas {
            display: block;
            background: #000;
        }
        
        #score {
            display: flex;
            justify-content: space-between;
            width: 800px;
            margin-bottom: 10px;
            font-size: 1.5em;
        }
        
        #controls {
            margin-top: 20px;
            text-align: center;
            color: #aaa;
        }
        
        #startMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2em;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <h1>Pong</h1>
    <div id="score">
        <span id="playerScore">Jogador: 0</span>
        <span id="robotScore">Robô: 0</span>
    </div>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="startMessage">Pressione ESPAÇO para começar</div>
    </div>
    <div id="controls">
        <p>Mova o mouse verticalmente para controlar a raquete</p>
        <p>ESPAÇO para iniciar/pausar</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startMessage = document.getElementById('startMessage');
        const playerScoreEl = document.getElementById('playerScore');
        const robotScoreEl = document.getElementById('robotScore');

        // Configurações do jogo
        const PADDLE_WIDTH = 15;
        const PADDLE_HEIGHT = 80;
        const BALL_SIZE = 10;
        const PADDLE_SPEED = 6;
        const BALL_SPEED = 5;
        const ROBOT_SPEED = 4;

        // Estado do jogo
        let gameRunning = false;
        let playerScore = 0;
        let robotScore = 0;

        // Raquete do jogador
        const player = {
            x: 20,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dy: 0
        };

        // Raquete do robô
        const robot = {
            x: canvas.width - 35,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dy: 0
        };

        // Bola
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: BALL_SIZE,
            dx: BALL_SPEED,
            dy: BALL_SPEED * (Math.random() > 0.5 ? 1 : -1)
        };

        // Controle do mouse
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            player.y = mouseY - PADDLE_HEIGHT / 2;

            // Limitar raquete dentro do canvas
            if (player.y < 0) player.y = 0;
            if (player.y > canvas.height - PADDLE_HEIGHT) {
                player.y = canvas.height - PADDLE_HEIGHT;
            }
        });

        // Controles de teclado
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                gameRunning = !gameRunning;
                startMessage.style.display = gameRunning ? 'none' : 'block';
                if (gameRunning) {
                    startGame();
                }
            }
        });

        function startGame() {
            resetBall();
            gameLoop();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = BALL_SPEED * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = BALL_SPEED * (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 0.5 + 0.5);
        }

        function updatePlayer() {
            // Movimento suave da raquete do jogador (já controlado pelo mouse)
        }

        function updateRobot() {
            // IA simples do robô
            const ballCenter = ball.y + ball.size / 2;
            const paddleCenter = robot.y + robot.height / 2;
            
            if (ballCenter < paddleCenter - 10) {
                robot.y -= ROBOT_SPEED;
            } else if (ballCenter > paddleCenter + 10) {
                robot.y += ROBOT_SPEED;
            }

            // Limitar raquete dentro do canvas
            if (robot.y < 0) robot.y = 0;
            if (robot.y > canvas.height - robot.height) {
                robot.y = canvas.height - robot.height;
            }
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Colisão com topo e fundo
            if (ball.y <= 0 || ball.y + ball.size >= canvas.height) {
                ball.dy = -ball.dy;
            }

            // Colisão com raquete do jogador
            if (
                ball.x <= player.x + player.width &&
                ball.x >= player.x &&
                ball.y + ball.size >= player.y &&
                ball.y <= player.y + player.height
            ) {
                ball.dx = Math.abs(ball.dx) * 1.05; // Aumenta velocidade
                
                // Muda ângulo baseado em onde bateu na raquete
                const hitPos = (ball.y + ball.size / 2 - player.y) / player.height;
                ball.dy = (hitPos - 0.5) * BALL_SPEED * 2;
            }

            // Colisão com raquete do robô
            if (
                ball.x + ball.size >= robot.x &&
                ball.x + ball.size <= robot.x + robot.width &&
                ball.y + ball.size >= robot.y &&
                ball.y <= robot.y + robot.height
            ) {
                ball.dx = -Math.abs(ball.dx) * 1.05; // Aumenta velocidade
                
                const hitPos = (ball.y + ball.size / 2 - robot.y) / robot.height;
                ball.dy = (hitPos - 0.5) * BALL_SPEED * 2;
            }

            // Bola sai pela esquerda (robô marca ponto)
            if (ball.x + ball.size < 0) {
                robotScore++;
                robotScoreEl.textContent = `Robô: ${robotScore}`;
                resetBall();
            }

            // Bola sai pela direita (jogador marca ponto)
            if (ball.x > canvas.width) {
                playerScore++;
                playerScoreEl.textContent = `Jogador: ${playerScore}`;
                resetBall();
            }
        }

        function draw() {
            // Limpar canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar linha central
            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Desenhar raquete do jogador
            ctx.fillStyle = '#0f0';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Desenhar raquete do robô
            ctx.fillStyle = '#f00';
            ctx.fillRect(robot.x, robot.y, robot.width, robot.height);

            // Desenhar bola
            ctx.fillStyle = '#fff';
            ctx.fillRect(ball.x, ball.y, ball.size, ball.size);
        }

        function gameLoop() {
            if (!gameRunning) return;

            updatePlayer();
            updateRobot();
            updateBall();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // Desenhar estado inicial
        draw();
    </script>
</body>
</html>
