name: Compilar Python

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Baixa o código
      - name: Checkout código
        uses: actions/checkout@v4
      
      # 2. Configura Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. Instala dependências
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests rich
      
      # 4. Compila o código
      - name: Compilar com PyInstaller
        run: |
          pyinstaller --onefile --name aisq main.py
          # --onefile = cria um único executável
          # --name = nome do arquivo de saída
      
      # 5. Faz upload do executável (opcional)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: executavel
          path: dist/aisq